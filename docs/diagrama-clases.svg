<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    
    <!-- Class Header Gradients -->
    <linearGradient id="userHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
    <linearGradient id="saleHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0ea5e9" />
      <stop offset="100%" stop-color="#0284c7" />
    </linearGradient>
    <linearGradient id="detailHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <linearGradient id="productHeader" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#db2777" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="dropShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" rx="12" fill="url(#bgGrad)" />
  <rect width="960" height="680" rx="12" fill="none" stroke="#334155" stroke-width="2" />

  <!-- Title -->
  <text x="480" y="40" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" letter-spacing="1">
    DIAGRAMA DE CLASES (UML)
  </text>
  <text x="480" y="65" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14">
    Modelo Entidad-Relación Mapeado a Clases del Negocio FARMABOL
  </text>

  <!-- ================= CLASS: USUARIO ================= -->
  <g transform="translate(60, 110)" filter="url(#dropShadow)">
    <rect width="220" height="200" rx="6" fill="#1e293b" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="220" height="35" rx="6" fill="url(#userHeader)"/>
    <rect y="29" width="220" height="6" fill="#1e293b" />
    <text x="110" y="22" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Usuario</text>
    
    <!-- Attributes -->
    <text x="12" y="55" fill="#38bdf8" font-family="monospace" font-size="11">+ id: int {PK}</text>
    <text x="12" y="70" fill="#f1f5f9" font-family="monospace" font-size="11">+ usuario: string {UK}</text>
    <text x="12" y="85" fill="#f1f5f9" font-family="monospace" font-size="11">+ pass: string</text>
    <text x="12" y="100" fill="#f1f5f9" font-family="monospace" font-size="11">+ nombre: string</text>
    <text x="12" y="115" fill="#f1f5f9" font-family="monospace" font-size="11">+ rol: string</text>
    <text x="12" y="130" fill="#f1f5f9" font-family="monospace" font-size="11">+ sucursal: string</text>

    <!-- Separator Line -->
    <line x1="0" y1="140" x2="220" y2="140" stroke="#334155" stroke-width="1.2" />

    <!-- Operations -->
    <text x="12" y="160" fill="#f1f5f9" font-family="monospace" font-size="11">+ validar(): boolean</text>
    <text x="12" y="175" fill="#94a3b8" font-family="monospace" font-size="11">+ obtenerDatos(): JSON</text>
  </g>

  <!-- ================= CLASS: VENTA ================= -->
  <g transform="translate(370, 110)" filter="url(#dropShadow)">
    <rect width="220" height="180" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="220" height="35" rx="6" fill="url(#saleHeader)"/>
    <rect y="29" width="220" height="6" fill="#1e293b" />
    <text x="110" y="22" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Venta</text>
    
    <!-- Attributes -->
    <text x="12" y="55" fill="#0284c7" font-family="monospace" font-size="11">+ id: int {PK}</text>
    <text x="12" y="70" fill="#f1f5f9" font-family="monospace" font-size="11">+ fecha: timestamp</text>
    <text x="12" y="85" fill="#f1f5f9" font-family="monospace" font-size="11">+ vendedor: string</text>
    <text x="12" y="100" fill="#f1f5f9" font-family="monospace" font-size="11">+ total: numeric</text>

    <!-- Separator Line -->
    <line x1="0" y1="115" x2="220" y2="115" stroke="#334155" stroke-width="1.2" />

    <!-- Operations -->
    <text x="12" y="135" fill="#f1f5f9" font-family="monospace" font-size="11">+ crearVenta(): int</text>
    <text x="12" y="150" fill="#f1f5f9" font-family="monospace" font-size="11">+ calcularTotal(): double</text>
  </g>

  <!-- ================= CLASS: PRODUCTO ================= -->
  <g transform="translate(680, 370)" filter="url(#dropShadow)">
    <rect width="220" height="220" rx="6" fill="#1e293b" stroke="#ec4899" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="220" height="35" rx="6" fill="url(#productHeader)"/>
    <rect y="29" width="220" height="6" fill="#1e293b" />
    <text x="110" y="22" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">Producto</text>
    
    <!-- Attributes -->
    <text x="12" y="55" fill="#db2777" font-family="monospace" font-size="11">+ id: int {PK}</text>
    <text x="12" y="70" fill="#f1f5f9" font-family="monospace" font-size="11">+ codigo: string {UK}</text>
    <text x="12" y="85" fill="#f1f5f9" font-family="monospace" font-size="11">+ nombre: string</text>
    <text x="12" y="100" fill="#f1f5f9" font-family="monospace" font-size="11">+ precio: numeric</text>
    <text x="12" y="115" fill="#f1f5f9" font-family="monospace" font-size="11">+ stock: int</text>
    <text x="12" y="130" fill="#f1f5f9" font-family="monospace" font-size="11">+ laboratorio: string</text>
    <text x="12" y="145" fill="#f1f5f9" font-family="monospace" font-size="11">+ categoria: string</text>

    <!-- Separator Line -->
    <line x1="0" y1="155" x2="220" y2="155" stroke="#334155" stroke-width="1.2" />

    <!-- Operations -->
    <text x="12" y="175" fill="#f1f5f9" font-family="monospace" font-size="11">+ verificarStock(): boolean</text>
    <text x="12" y="190" fill="#f1f5f9" font-family="monospace" font-size="11">+ actualizarStock(): int</text>
  </g>

  <!-- ================= CLASS: DETALLE_VENTA ================= -->
  <g transform="translate(370, 370)" filter="url(#dropShadow)">
    <rect width="220" height="220" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1.5"/>
    <!-- Header -->
    <rect width="220" height="35" rx="6" fill="url(#detailHeader)"/>
    <rect y="29" width="220" height="6" fill="#1e293b" />
    <text x="110" y="22" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold">DetalleVenta</text>
    
    <!-- Attributes -->
    <text x="12" y="55" fill="#059669" font-family="monospace" font-size="11">+ id: int {PK}</text>
    <text x="12" y="70" fill="#0ea5e9" font-family="monospace" font-size="11">+ venta_id: int {FK}</text>
    <text x="12" y="85" fill="#db2777" font-family="monospace" font-size="11">+ producto_id: int {FK}</text>
    <text x="12" y="100" fill="#f1f5f9" font-family="monospace" font-size="11">+ codigo: string</text>
    <text x="12" y="115" fill="#f1f5f9" font-family="monospace" font-size="11">+ nombre: string</text>
    <text x="12" y="130" fill="#f1f5f9" font-family="monospace" font-size="11">+ cantidad: int</text>
    <text x="12" y="145" fill="#f1f5f9" font-family="monospace" font-size="11">+ precio: numeric</text>

    <!-- Separator Line -->
    <line x1="0" y1="155" x2="220" y2="155" stroke="#334155" stroke-width="1.2" />

    <!-- Operations -->
    <text x="12" y="175" fill="#f1f5f9" font-family="monospace" font-size="11">+ calcularSubtotal(): double</text>
  </g>

  <!-- ================= ASSOCIATIONS / RELATIONSHIPS ================= -->

  <!-- 1. Usuario (1) --- (0..*) Venta (registra) -->
  <g>
    <line x1="280" y1="200" x2="370" y2="200" stroke="#64748b" stroke-width="1.5" />
    <!-- Navigation arrow to Venta -->
    <path d="M 363 196 L 370 200 L 363 204" fill="none" stroke="#64748b" stroke-width="1.5" />
    <!-- Multiplicities -->
    <text x="290" y="192" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">1</text>
    <text x="350" y="192" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">0..*</text>
    <!-- Label -->
    <text x="325" y="215" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">registra</text>
  </g>

  <!-- 2. Venta (1) *---# DetalleVenta (1..*) (Composition) -->
  <!-- Composition relationship: Diamond on Venta side, line down to DetalleVenta -->
  <g>
    <!-- Line from bottom of Venta (480, 290) to top of DetalleVenta (480, 370) -->
    <!-- Diamond height: 16px (from 290 to 306) -->
    <path d="M 480 290 L 485 298 L 480 306 L 475 298 Z" fill="#64748b" stroke="#64748b" stroke-width="1.5" />
    <line x1="480" y1="306" x2="480" y2="370" stroke="#64748b" stroke-width="1.5" />
    <!-- Navigation arrow to DetalleVenta -->
    <path d="M 476 363 L 480 370 L 484 363" fill="none" stroke="#64748b" stroke-width="1.5" />
    <!-- Multiplicities -->
    <text x="490" y="322" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">1</text>
    <text x="490" y="360" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">1..*</text>
    <!-- Label -->
    <text x="445" y="338" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">contiene</text>
  </g>

  <!-- 3. Producto (1) --- (0..*) DetalleVenta (se vende en) -->
  <g>
    <line x1="680" y1="480" x2="590" y2="480" stroke="#64748b" stroke-width="1.5" />
    <!-- Navigation arrow to DetalleVenta -->
    <path d="M 597 476 L 590 480 L 597 484" fill="none" stroke="#64748b" stroke-width="1.5" />
    <!-- Multiplicities -->
    <text x="665" y="472" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">1</text>
    <text x="605" y="472" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">0..*</text>
    <!-- Label -->
    <text x="635" y="498" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="10">se vende en</text>
  </g>

</svg>
